name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Cordova
        run: npm install -g cordova

      - name: Crear proyecto Cordova
        run: |
          cordova create MundoJugueton com.tujuego.mundojugueton "Mundo Jugueton"
          cd MundoJugueton
          cordova platform add android

      - name: Copiar archivos del juego
        run: |
          cp *.html MundoJugueton/www/ 2>/dev/null || true
          cp *.png MundoJugueton/www/ 2>/dev/null || true
          cp *.jpg MundoJugueton/www/ 2>/dev/null || true
          cp *.mp3 MundoJugueton/www/ 2>/dev/null || true
          cp *.wav MundoJugueton/www/ 2>/dev/null || true
          cp *.ogg MundoJugueton/www/ 2>/dev/null || true
          cp -r "Las Texturas de Ignacio" MundoJugueton/www/ 2>/dev/null || true
          cp -r "Personajes en Resolución Original" MundoJugueton/www/ 2>/dev/null || true

      - name: Configurar config.xml
        run: |
          python3 -c "
          xml = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <widget id=\"com.tujuego.mundojugueton\" version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\">
          <n>Mundo Jugueton</n>
          <description>Juego educativo interactivo</description>
          <author>Las Cabezas de Ignacio</author>
          <content src=\"index.html\" />
          <preference name=\"Orientation\" value=\"landscape\" />
          <preference name=\"Fullscreen\" value=\"true\" />
          <preference name=\"AllowInlineMediaPlayback\" value=\"true\" />
          <preference name=\"android-minSdkVersion\" value=\"22\" />
          <preference name=\"android-targetSdkVersion\" value=\"33\" />
          <allow-navigation href=\"*\" />
          <allow-intent href=\"http://*/*\" />
          <allow-intent href=\"https://*/*\" />
          <access origin=\"*\" />
          </widget>'''
          open('MundoJugueton/config.xml', 'w').write(xml)
          "

      - name: Compilar APK
        run: |
          cd MundoJugueton
          cordova build android --debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MundoJugueton-APK
          path: MundoJugueton/platforms/android/app/build/outputs/apk/debug/app-debug.apk